<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/portfolio/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-icon.png" />

    <!-- Global meta (per-route tags live in components via <SEO />) -->
    <meta name="author" content="TheKhan" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- No fallback <title> here: React 19 does NOT dedupe <title> against
         the source HTML, so any title in index.html would stack on top of
         the per-route <SEO /> title and confuse Google. Every route owns
         its title via <SEO />. Social crawlers that don't execute JS will
         see no title until we add build-time prerendering (follow-up). -->

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CF1CCVLVRB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CF1CCVLVRB');
    </script>
  </head>
  <body class="antialiased" style="font-family: 'Manrope', system-ui, sans-serif;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
