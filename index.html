<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon: SVG monogram with light/dark auto-swap.
         Forest green TK on light browser themes, sage TK on dark themes.
         PNG kept as fallback for legacy browsers that ignore SVG icons. -->
    <link rel="icon" href="/favicon-light.svg" media="(prefers-color-scheme: light)" type="image/svg+xml" />
    <link rel="icon" href="/favicon-dark.svg" media="(prefers-color-scheme: dark)" type="image/svg+xml" />
    <link rel="icon" type="image/png" href="/portfolio/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-icon.png" />

    <!-- Global meta (per-route tags live in components via <SEO />) -->
    <meta name="author" content="TheKhan" />

    <meta name="theme-color" content="#1F1B17" />
    <meta name="color-scheme" content="dark" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- No fallback <title> here: React 19 does NOT dedupe <title> against
         the source HTML, so any title in index.html would stack on top of
         the per-route <SEO /> title and confuse Google. Every route owns
         its title via <SEO />. Social crawlers that don't execute JS will
         see no title until we add build-time prerendering (follow-up). -->

    <!-- Fonts: Cinzel (logo only) + Manrope (body) from Google Fonts.
         General Sans (display) + JetBrains Mono (numerals) + Anton (eyebrow)
         from Fontshare/Google. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Anton&display=swap" rel="stylesheet" />
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet" />

    <!-- Cloudflare Turnstile (bot shield for forms — site key baked in
         per widget; explicit-render via TurnstileWidget React component) -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CF1CCVLVRB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CF1CCVLVRB');
    </script>

    <!-- Microsoft Clarity (heatmaps + session recordings) -->
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "wzxzotwogo");
    </script>
  </head>
  <body class="antialiased" style="font-family: 'Manrope', system-ui, sans-serif; color: #F5F1EB;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
